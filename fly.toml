# fly.toml app configuration file generated for bpmonitor on 2026-03-11T22:54:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bpmonitor'
primary_region = 'ams'

[build]
  dockerfile = "./Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']
  
  [[http_service.mounts]]
    source = "bp_data"
    destination = "/app/data"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[processes]
  app = "node server.js"
